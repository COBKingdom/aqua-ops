kind = "web"
previewPath = "/"
title = "AquaOps"
version = "1.0.0"
id = "artifacts/aquaops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25821

[services.development]
run = "pnpm --filter @workspace/aquaops run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aquaops", "run", "build" ]
publicDir = "artifacts/aquaops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25821"
BASE_PATH = "/"
